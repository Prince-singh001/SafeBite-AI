<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SafeBite AI Assistant | Food Chatbot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🥗</text></svg>">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
    <style>
      .chat-wrapper {
        width: 92%;
        max-width: 900px;
        margin: 50px auto 70px;
      }
      
      .chat-container {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 28px;
        box-shadow: var(--shadow);
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 600px;
        backdrop-filter: blur(20px);
      }
      
      .chat-header {
        padding: 24px 30px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: linear-gradient(135deg, rgba(20, 241, 149, 0.05), rgba(76, 201, 240, 0.05));
      }
      
      .chat-bot-profile {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      
      .bot-avatar {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
        box-shadow: 0 8px 20px rgba(20, 241, 149, 0.2);
      }
      
      .bot-info h2 {
        font-size: 1.15rem;
        font-weight: 800;
        margin: 0;
      }
      
      .bot-status {
        font-size: 0.85rem;
        color: var(--muted);
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 2px;
      }
      
      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--primary);
        box-shadow: 0 0 10px var(--primary);
        display: inline-block;
      }
      
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 30px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        background: rgba(255, 255, 255, 0.01);
      }
      
      .message-bubble {
        max-width: 75%;
        padding: 16px 20px;
        border-radius: 20px;
        line-height: 1.6;
        font-size: 0.98rem;
        animation: bubbleAppear 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        word-wrap: break-word;
      }
      
      @keyframes bubbleAppear {
        from {
          opacity: 0;
          transform: translateY(12px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
        }
      }
      
      .message-bubble.bot {
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        align-self: flex-start;
        border-top-left-radius: 4px;
      }
      
      .message-bubble.user {
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        align-self: flex-end;
        border-top-right-radius: 4px;
        box-shadow: 0 8px 25px rgba(20, 241, 149, 0.15);
      }
      
      .message-bubble p {
        margin: 0;
      }
      
      .message-bubble ul {
        margin: 10px 0 0 20px;
        padding: 0;
      }
      
      .message-bubble li {
        margin-bottom: 6px;
      }
      
      .typing-indicator {
        align-self: flex-start;
        background: var(--bg);
        border: 1px solid var(--border);
        padding: 16px 22px;
        border-radius: 20px;
        border-top-left-radius: 4px;
        display: none;
        align-items: center;
        gap: 5px;
      }
      
      .typing-dot {
        width: 8px;
        height: 8px;
        background: var(--muted);
        border-radius: 50%;
        animation: typingBounce 1.4s infinite ease-in-out both;
      }
      
      .typing-dot:nth-child(1) { animation-delay: -0.32s; }
      .typing-dot:nth-child(2) { animation-delay: -0.16s; }
      
      @keyframes typingBounce {
        0%, 80%, 100% { transform: scale(0); }
        40% { transform: scale(1.0); }
      }
      
      .chat-input-area {
        padding: 20px 30px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 16px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.01), rgba(255, 255, 255, 0.02));
      }
      
      .chat-input-box {
        flex: 1;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--text);
        padding: 16px 20px;
        border-radius: 16px;
        outline: none;
        font-family: inherit;
        font-size: 0.98rem;
        transition: border-color 0.3s ease;
      }
      
      .chat-input-box:focus {
        border-color: var(--primary);
      }
      
      .chat-send-btn {
        border: none;
        cursor: pointer;
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        color: white;
        padding: 0 28px;
        border-radius: 16px;
        font-weight: 800;
        font-size: 0.95rem;
        box-shadow: 0 8px 25px rgba(20, 241, 149, 0.2);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      
      .chat-send-btn:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 28px rgba(20, 241, 149, 0.25);
      }
      
      .chat-send-btn:active {
        transform: translateY(1px);
      }
      
      /* Markdown parsing styling helper */
      .bot strong {
        color: var(--primary);
      }
      [data-theme="dark"] .bot strong {
        color: var(--secondary);
      }
    </style>
  </head>
  <body>
    {% include 'components/navbar.html' %}

    <div class="chat-wrapper">
      <div class="chat-container">
        <div class="chat-header">
          <div class="chat-bot-profile">
            <div class="bot-avatar">🤖</div>
            <div class="bot-info">
              <h2>SafeBite Assistant</h2>
              <div class="bot-status">
                <span class="status-dot"></span>
                <span>Active Online</span>
              </div>
            </div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages">
          <div class="message-bubble bot">
            Hello! I am your SafeBite AI assistant. I can help you with food storage tips, food safety guidelines, or explain how the SafeBite AI scanner works. What can I help you with today?
          </div>
          
          <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        </div>

        <div class="chat-input-area">
          <input type="text" class="chat-input-box" id="chatInput" placeholder="Ask about storage, safety or scanner..." autocomplete="off" />
          <button class="chat-send-btn" id="chatSendBtn" type="button">
            Send ➔
          </button>
        </div>
      </div>
    </div>

    {% include 'components/footer.html' %}

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
      const chatMessages = document.getElementById("chatMessages");
      const chatInput = document.getElementById("chatInput");
      const chatSendBtn = document.getElementById("chatSendBtn");
      const typingIndicator = document.getElementById("typingIndicator");

      function formatResponse(text) {
        // Simple Markdown parsing for bullet points and bold styling
        let formatted = text;
        
        // Escape HTML tags slightly
        formatted = formatted.replace(/</g, "&lt;").replace(/>/g, "&gt;");
        
        // Bold formatting **text** -> <strong>text</strong>
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>");
        
        // Bullet points - list conversion
        if (formatted.includes("\n- ")) {
          const parts = formatted.split("\n- ");
          let intro = parts[0];
          let listItems = parts.slice(1).map(item => `<li>${item.replace(/\n/g, "<br>")}</li>`).join("");
          formatted = `${intro}<ul>${listItems}</ul>`;
        } else {
          // Replace remaining newlines with <br>
          formatted = formatted.replace(/\n/g, "<br>");
        }
        
        return formatted;
      }

      function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      async function sendMessage() {
        const queryText = chatInput.value.trim();
        if (!queryText) return;

        // Clear input box
        chatInput.value = "";

        // Append User message
        const userBubble = document.createElement("div");
        userBubble.className = "message-bubble user";
        userBubble.textContent = queryText;
        chatMessages.insertBefore(userBubble, typingIndicator);
        scrollToBottom();

        // Show typing indicator
        typingIndicator.style.display = "flex";
        scrollToBottom();

        try {
          const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: queryText })
          });
          const data = await response.json();

          // Hide indicator
          typingIndicator.style.display = "none";

          // Append Bot Response
          const botBubble = document.createElement("div");
          botBubble.className = "message-bubble bot";
          if (data.response) {
            botBubble.innerHTML = formatResponse(data.response);
          } else {
            botBubble.textContent = data.error || "Sorry, I encountered an error. Please try again.";
          }
          chatMessages.insertBefore(botBubble, typingIndicator);
          scrollToBottom();

        } catch (err) {
          console.error("Chat error:", err);
          typingIndicator.style.display = "none";
          
          const errorBubble = document.createElement("div");
          errorBubble.className = "message-bubble bot";
          errorBubble.textContent = "Failed to connect to the server. Please check your connection and retry.";
          chatMessages.insertBefore(errorBubble, typingIndicator);
          scrollToBottom();
        }
      }

      chatSendBtn.addEventListener("click", sendMessage);
      chatInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") {
          e.preventDefault();
          sendMessage();
        }
      });
      
      // Auto focus chat input on page load
      window.addEventListener("DOMContentLoaded", () => {
        chatInput.focus();
      });
    </script>
  </body>
</html>
